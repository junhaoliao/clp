{{- if has "results_cache" .Values.clpConfig.bundled }}
apiVersion: "apps/v1"
kind: "StatefulSet"
metadata:
  name: {{ include "clp.fullname" . }}-results-cache
  labels:
    {{- include "clp.labels" . | nindent 4 }}
    app.kubernetes.io/component: "results-cache"
spec:
  serviceName: {{ include "clp.fullname" . }}-results-cache
  replicas: 1
  selector:
    matchLabels:
      {{- include "clp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: "results-cache"
  template:
    metadata:
      labels:
        {{- include "clp.labels" . | nindent 8 }}
        app.kubernetes.io/component: "results-cache"
    spec:
      {{- include "clp.createSchedulingConfigs" (dict
          "root" .
          "component" "resultsCache"
        ) | nindent 6 }}
      initContainers:
        - name: "results-cache-indices-creator"
          image: "{{ include "clp.image.ref" . }}"
          imagePullPolicy: "{{ .Values.image.clpPackage.pullPolicy }}"
          restartPolicy: Always
          env:
            - name: "PYTHONPATH"
              value: "/opt/clp/lib/python3/site-packages"
          command:
            - "/bin/bash"
            - "-c"
            - |
              python3 -u -m clp_py_utils.initialize-results-cache \
                --uri "mongodb://{{ include "clp.resultsCacheHost" . }}:{{ include "clp.resultsCachePort" . | int }}/{{ .Values.clpConfig.results_cache.db_name }}" \
                --stream-collection "{{ .Values.clpConfig.results_cache.stream_collection_name }}"
              exec sleep infinity
      containers:
        - name: "results-cache"
          image: "mongo:8.0.21"
          imagePullPolicy: "Always"
          ports:
            - name: "results-cache"
              containerPort: 27017
          volumeMounts:
            - name: {{ include "clp.volumeName" (dict
                "component_category" "results-cache"
                "name" "data"
              ) | quote }}
              mountPath: "/data/db"
            - name: "config"
              mountPath: "/etc/mongo/mongod.conf"
              subPath: "mongod.conf"
              readOnly: true
          args: [
            "--config", "/etc/mongo/mongod.conf",
            "--bind_ip", "0.0.0.0"
          ]
          readinessProbe:
            {{- include "clp.readinessProbeTimings" . | nindent 12 }}
            exec:
              command:
                - "mongosh"
                - "127.0.0.1:27017/admin"
                - "--quiet"
                - "--eval"
                - |
                  if (db.runCommand('ping').ok !== 1) { quit(1); }
                  try {
                    var status = db.runCommand({replSetGetStatus: 1});
                    var hasPrimary = status.members.some(function(m) { return m.stateStr === 'PRIMARY'; });
                    if (!hasPrimary) { quit(1); }
                  } catch (e) { quit(1); }
          livenessProbe:
            {{- include "clp.livenessProbeTimings" . | nindent 12 }}
            exec:
              command:
                - "mongosh"
                - "127.0.0.1:27017/test"
                - "--quiet"
                - "--eval"
                - "db.runCommand('ping').ok"
      volumes:
        - name: "config"
          configMap:
            name: {{ include "clp.fullname" . }}-config
  volumeClaimTemplates:
    - metadata:
        name: {{ include "clp.volumeName" (dict
            "component_category" "results-cache"
            "name" "data"
          ) | quote }}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: "10Gi"
{{- end }}
